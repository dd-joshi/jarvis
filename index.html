<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS - Logic Studio</title>
  <style>
    :root {
      --bg: #0a0d12;
      --panel: #111722;
      --panel-2: #0f141d;
      --text: #e8edf6;
      --muted: #9aa8c2;
      --line: #223049;
      --accent: #59a6ff;
      --accent-2: #3d8ef0;
      --ok: #5bd6a7;
      --danger: #ff6b6b;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(circle at top right, #122033 0%, var(--bg) 45%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      width: min(860px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) , var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,0.2);
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand .small {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand .name {
      font-weight: 700;
      letter-spacing: 0.03em;
      font-size: 17px;
    }

    .content {
      padding: 22px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: #b9c6de;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .input-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(89, 166, 255, 0.2);
    }

    .btn {
      border: 1px solid var(--line);
      background: #152036;
      color: var(--text);
      padding: 10px 13px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s, transform 0.05s;
      user-select: none;
      white-space: nowrap;
    }

    .btn:hover { border-color: #36527f; background: #1a2a45; }
    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #08111e;
      font-weight: 800;
    }

    .btn-primary:hover { filter: brightness(1.04); }

    .btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(0.15);
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .hint a {
      color: #9fcbff;
      text-decoration: none;
    }

    .hint a:hover { text-decoration: underline; }

    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
      color: var(--muted);
    }

    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }

    .hidden { display: none !important; }

    /* Workspace */
    .workspace {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 560px;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(0,0,0,0.2);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .assistant-title {
      font-weight: 800;
      letter-spacing: 0.03em;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool {
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: #111b2d;
      color: #c5d4ee;
      cursor: pointer;
    }

    .tool:hover {
      border-color: #3b5887;
      background: #16233a;
    }

    .section-title {
      margin-top: 6px;
      margin-bottom: 6px;
      color: #b6c6e2;
      letter-spacing: 0.06em;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 270px;
      overflow: auto;
      padding-right: 2px;
    }

    .project {
      border: 1px solid var(--line);
      background: #0f192a;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #cfe0ff;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-log {
      flex: 1;
      padding: 16px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 90%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.45;
      font-size: 14px;
      border: 1px solid var(--line);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      margin-left: auto;
      background: #1c3559;
      border-color: #365a8f;
    }

    .msg.assistant {
      margin-right: auto;
      background: #131d2e;
      color: #d9e7ff;
    }

    .composer {
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      background: rgba(0,0,0,0.18);
    }

    .composer input {
      width: 100%;
    }

    .footer-hint {
      font-size: 12px;
      color: var(--muted);
      padding: 0 12px 10px;
      text-align: right;
    }

    @media (max-width: 820px) {
      .workspace {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .chat-log { min-height: 300px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="topbar">
        <div class="brand">
          <span class="small">Logic Studio</span>
          <span class="name">JARVIS</span>
        </div>
        <span class="small" id="modeLabel">Setup</span>
      </div>

      <!-- Setup Screen -->
      <section id="setupScreen" class="content">
        <h1 class="title">JARVIS</h1>
        <p class="subtitle">
          Your personal AI assistant.<br />
          Enter your Anthropic API key to begin.<br />
          Stored locally on your device only.
        </p>

        <label for="apiKeyInput" class="field-label">Anthropic API Key</label>
        <div class="input-wrap">
          <input
            id="apiKeyInput"
            type="password"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-ant-..."
            aria-describedby="keyHint"
          />
          <button id="toggleKeyBtn" class="btn" type="button" aria-label="Show or hide API key">Show</button>
        </div>

        <p id="keyHint" class="hint">
          Get your key at
          <a href="https://console.anthropic.com" target="_blank" rel="noopener noreferrer">console.anthropic.com</a>
          → API Keys → Create Key
        </p>

        <div class="status" id="setupStatus"></div>

        <div style="margin-top: 14px;">
          <button id="startJarvisBtn" class="btn btn-primary" type="button" disabled>
            Start JARVIS →
          </button>
        </div>
      </section>

      <!-- Assistant Screen -->
      <section id="assistantScreen" class="workspace hidden">
        <aside class="sidebar">
          <div class="assistant-title">JARVIS<br/>PERSONAL ASSISTANT</div>

          <div class="toolbar">
            <button id="boardBtn" class="tool" type="button">⊞ board</button>
            <button id="clearBtn" class="tool" type="button">✕ clear</button>
            <button id="settingsBtn" class="tool" type="button">⚙</button>
          </div>

          <div>
            <div class="section-title">Projects & Tasks</div>
            <button id="addProjectBtn" class="tool" type="button">+ project</button>
            <div id="projectsList" class="projects" aria-live="polite"></div>
          </div>
        </aside>

        <div class="main">
          <div id="chatLog" class="chat-log" aria-live="polite"></div>
          <div class="composer">
            <input id="chatInput" type="text" placeholder="Message JARVIS..." />
            <button id="sendBtn" class="btn" type="button">↑</button>
          </div>
          <div class="footer-hint">ENTER to send</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // --- Element refs (stable IDs) ---
      const modeLabel = document.getElementById('modeLabel');

      const setupScreen = document.getElementById('setupScreen');
      const assistantScreen = document.getElementById('assistantScreen');

      const apiKeyInput = document.getElementById('apiKeyInput');
      const toggleKeyBtn = document.getElementById('toggleKeyBtn');
      const setupStatus = document.getElementById('setupStatus');
      const startJarvisBtn = document.getElementById('startJarvisBtn');

      const boardBtn = document.getElementById('boardBtn');
      const clearBtn = document.getElementById('clearBtn');
      const settingsBtn = document.getElementById('settingsBtn');
      const addProjectBtn = document.getElementById('addProjectBtn');
      const projectsList = document.getElementById('projectsList');

      const chatLog = document.getElementById('chatLog');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');

      // Guard critical elements
      if (!apiKeyInput || !startJarvisBtn || !setupScreen || !assistantScreen) {
        console.error('Critical UI elements are missing.');
        return;
      }

      let sessionApiKey = '';
      let projectCount = 0;
      let boardMode = false;

      // --- Validation (fix for Start button not enabling) ---
      function isLikelyAnthropicKey(value) {
        const v = (value || '').trim();
        return v.length > 10 && v.startsWith('sk-ant-');
      }

      function updateStartButtonState() {
        const valid = isLikelyAnthropicKey(apiKeyInput.value);
        startJarvisBtn.disabled = !valid;

        if (!apiKeyInput.value.trim()) {
          setupStatus.textContent = '';
          setupStatus.className = 'status';
          return;
        }

        if (valid) {
          setupStatus.textContent = 'Key format looks valid. You can start JARVIS.';
          setupStatus.className = 'status ok';
        } else {
          setupStatus.textContent = 'Invalid key format. Expected: sk-ant-...';
          setupStatus.className = 'status err';
        }
      }

      // Bind events safely
      apiKeyInput.addEventListener('input', updateStartButtonState);
      apiKeyInput.addEventListener('change', updateStartButtonState);
      apiKeyInput.addEventListener('paste', () => setTimeout(updateStartButtonState, 0));
      apiKeyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !startJarvisBtn.disabled) {
          e.preventDefault();
          startJarvisBtn.click();
        }
      });

      if (toggleKeyBtn) {
        toggleKeyBtn.addEventListener('click', () => {
          const showing = apiKeyInput.type === 'text';
          apiKeyInput.type = showing ? 'password' : 'text';
          toggleKeyBtn.textContent = showing ? 'Show' : 'Hide';
        });
      }

      startJarvisBtn.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (!isLikelyAnthropicKey(key)) {
          updateStartButtonState();
          return;
        }

        sessionApiKey = key; // kept in memory only for this session
        setupScreen.classList.add('hidden');
        assistantScreen.classList.remove('hidden');
        modeLabel.textContent = 'Assistant';

        addMessage('assistant', 'JARVIS online. How can I help you today?');
        chatInput?.focus();
      });

      // Optional controls (null-safe so no init crash)
      if (boardBtn) {
        boardBtn.addEventListener('click', () => {
          boardMode = !boardMode;
          boardBtn.style.borderColor = boardMode ? '#5f8fd0' : '';
          addMessage('assistant', boardMode ? 'Board mode enabled.' : 'Board mode disabled.');
        });
      }

      if (settingsBtn) {
        settingsBtn.addEventListener('click', () => {
          addMessage('assistant', 'Settings panel is not implemented in this single-file demo.');
        });
      }

      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          if (chatLog) chatLog.innerHTML = '';
          addMessage('assistant', 'Conversation cleared.');
        });
      }

      if (addProjectBtn && projectsList) {
        addProjectBtn.addEventListener('click', () => {
          projectCount += 1;
          const item = document.createElement('div');
          item.className = 'project';
          item.textContent = `Project ${projectCount}`;
          projectsList.prepend(item);
        });
      }

      function addMessage(role, text) {
        if (!chatLog) return;
        const node = document.createElement('div');
        node.className = `msg ${role === 'user' ? 'user' : 'assistant'}`;
        node.textContent = text;
        chatLog.appendChild(node);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function handleSend() {
        const text = (chatInput?.value || '').trim();
        if (!text) return;
        addMessage('user', text);
        if (chatInput) chatInput.value = '';

        // Demo response (replace with actual API request logic if needed)
        const reply = `Received: "${text}"\n(API key is set: ${sessionApiKey ? 'yes' : 'no'})`;
        setTimeout(() => addMessage('assistant', reply), 200);
      }

      if (sendBtn) sendBtn.addEventListener('click', handleSend);
      if (chatInput) {
        chatInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            handleSend();
          }
        });
      }

      // Initial state
      updateStartButtonState();
    });
  </script>
</body>
</html>
